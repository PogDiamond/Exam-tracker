<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Tracker PWA</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkFjYWRlbWljIFRyYWNrZXIiLAogICJzaG9ydF9uYW1lIjogIlRyYWNrZXIiLAogICJzdGFydF91cmwiOiAiLi9pbmRleC5odG1sIiwKICAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgICJiYWNrZ3JvdW5kX2NvbG9yIjogIiNmM2Y0ZjYiLAogICAidGhlbWVfY29sb3IiOiAiIzRmMzZlNSIKfQ==">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen pb-12">

    <div id="syncBanner" class="bg-amber-500 text-white text-xs font-semibold px-4 py-2 flex justify-between items-center">
        <span id="syncStatusText" class="flex items-center gap-1">
            <i data-lucide="cloud-off" class="w-3.5 h-3.5"></i> Local Storage Mode (Apps Script Web App URL Not Linked)
        </span>
        <button onclick="setupGoogleSheet()" class="bg-white/20 hover:bg-white/30 px-2 py-0.5 rounded text-[11px] transition">
            Link Web App URL
        </button>
    </div>

    <header class="bg-indigo-700 text-white shadow-lg mb-6">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold flex items-center gap-2"><i data-lucide="cloud-lightning"></i> Exam Tracker Profile</h1>
            <div class="flex flex-wrap gap-2 justify-center">
                <input type="file" id="importFileInput" accept=".json" onchange="handleImportFile(event)" class="hidden">
                <button onclick="document.getElementById('importFileInput').click()" class="bg-indigo-800/60 hover:bg-indigo-800/90 px-3 py-1.5 rounded text-xs font-semibold flex items-center gap-1 text-indigo-100"><i data-lucide="upload" class="w-3.5 h-3.5"></i> Import JSON</button>
                <button onclick="exportData()" class="bg-indigo-800/60 hover:bg-indigo-800/90 px-3 py-1.5 rounded text-xs font-semibold flex items-center gap-1 text-indigo-100"><i data-lucide="download" class="w-3.5 h-3.5"></i> Export Backup</button>
                <button onclick="pushToSheets()" class="bg-emerald-600 hover:bg-emerald-500 px-3 py-1.5 rounded text-xs font-semibold flex items-center gap-1 text-white shadow"><i data-lucide="cloud-lightning" class="w-3.5 h-3.5"></i> Push to Sheet</button>
                <button onclick="pullFromSheets()" class="bg-indigo-600 hover:bg-indigo-500 px-3 py-1.5 rounded text-xs font-semibold flex items-center gap-1 text-white shadow"><i data-lucide="refresh-cw" class="w-3.5 h-3.5" id="syncBtnIcon"></i> Pull from Sheet</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="space-y-8 lg:col-span-1">
            <section class="bg-white p-6 rounded-xl shadow-md border border-gray-100">
                <h2 class="text-xl font-bold mb-4 text-indigo-900 flex items-center gap-2"><i data-lucide="plus-circle" class="text-indigo-600"></i> Log New Marks</h2>
                <form id="markForm" class="space-y-4" onsubmit="handleMarkSubmit(event)">
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">Date</label><input type="date" id="markDate" required class="w-full border rounded-lg p-2 outline-none"></div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Subject</label>
                        <select id="subject" onchange="handleSubjectChange()" required class="w-full border rounded-lg p-2 outline-none">
                            <option value="Combined Maths">Combined Mathematics</option>
                            <option value="Physics 2026">Physics (2026 Syllabus)</option>
                            <option value="Physics 2027">Physics (2027 Syllabus)</option>
                            <option value="Chemistry">Chemistry</option>
                        </select>
                    </div>
                    <div id="componentWrapper">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Component</label>
                        <select id="component" class="w-full border rounded-lg p-2 outline-none">
                            <option value="MCQ">MCQ</option><option value="Essay">Essay / Structured</option><option value="Full Paper">Full Composite Paper</option>
                        </select>
                    </div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">Paper Identity</label><input type="text" id="paperName" placeholder="e.g., 2018 Past Paper" required class="w-full border rounded-lg p-2 outline-none"></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">Topic Tag</label><input type="text" id="topicTag" placeholder="e.g., Mechanics" class="w-full border rounded-lg p-2 outline-none"></div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-sm font-medium text-gray-700 mb-1">Obtained</label><input type="number" step="0.01" id="scoreObtained" required min="0" class="w-full border rounded-lg p-2 outline-none"></div>
                        <div><label class="block text-sm font-medium text-gray-700 mb-1">Out Of</label><input type="number" step="0.01" id="scoreTotal" required min="1" class="w-full border rounded-lg p-2 outline-none"></div>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold p-2.5 rounded-lg transition shadow flex justify-center items-center gap-2"><i data-lucide="save" class="w-4 h-4"></i> Save Entry</button>
                </form>
            </section>
        </div>

        <div class="lg:col-span-2 space-y-8">
            <section class="bg-white p-6 rounded-xl shadow-md border border-gray-100">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-indigo-900 flex items-center gap-2"><i data-lucide="bar-chart-3" class="text-indigo-600"></i> Analytics</h2>
                    <select id="timeframeFilter" onchange="updateDashboard()" class="border rounded-lg p-1.5 text-sm bg-gray-50 outline-none">
                        <option value="7">Past Week</option><option value="30" selected>Past Month</option><option value="all">All Time</option>
                    </select>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 mb-6" id="averagesGrid"></div>
                <div class="relative w-full h-72 md:h-96 bg-gray-50 rounded-xl p-2"><canvas id="performanceChart"></canvas></div>
            </section>

            <section class="bg-white p-6 rounded-xl shadow-md border border-gray-100">
                <h2 class="text-xl font-bold mb-4 text-indigo-900 flex items-center gap-2"><i data-lucide="history" class="text-indigo-600"></i> Score Log</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b bg-gray-50 text-xs font-semibold uppercase tracking-wider text-gray-500">
                                <th class="p-3">Date</th><th class="p-3">Subject</th><th class="p-3">Paper / Tag</th><th class="p-3 text-center">Raw Score</th><th class="p-3 text-right">Normalized</th><th class="p-3 text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody" class="text-sm divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <script>
        let marks = JSON.parse(localStorage.getItem('real_sheet_marks')) || [];
        let scriptUrl = localStorage.getItem('tracker_script_url') || '';
        let chartInstance = null;

        const SUBJECTS = ["Combined Maths", "Physics 2026", "Physics 2027", "Chemistry"];
        const TARGET_BENCHMARK = 75;

        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            document.getElementById('markDate').value = new Date().toISOString().split('T')[0];
            updateSyncStatus();
            updateDashboard();
        });

        function updateSyncStatus(status = 'idle') {
            const banner = document.getElementById('syncBanner');
            const text = document.getElementById('syncStatusText');
            if (!scriptUrl) {
                banner.className = "bg-amber-500 text-white text-xs font-semibold px-4 py-2 flex justify-between items-center";
                text.innerHTML = `<i data-lucide="cloud-off" class="w-3.5 h-3.5"></i> Offline Mode (Web App URL Not Configured)`;
            } else if (status === 'syncing') {
                banner.className = "bg-blue-600 text-white text-xs font-semibold px-4 py-2 flex justify-between items-center";
                text.innerHTML = `<i data-lucide="refresh-cw" class="w-3.5 h-3.5 animate-spin"></i> Communicating with Google Spreadsheet...`;
            } else {
                banner.className = "bg-emerald-600 text-white text-xs font-semibold px-4 py-2 flex justify-between items-center";
                text.innerHTML = `<i data-lucide="cloud" class="w-3.5 h-3.5"></i> Connected to Google Sheets API`;
            }
            lucide.createIcons();
        }

        function setupGoogleSheet() {
            const url = prompt("Paste your Google Apps Script Web App URL (ends in /exec):", scriptUrl);
            if (url) {
                scriptUrl = url.trim();
                localStorage.setItem('tracker_script_url', scriptUrl);
                updateSyncStatus();
            }
        }

        function handleMarkSubmit(e) {
            e.preventDefault();
            const date = document.getElementById('markDate').value;
            const subject = document.getElementById('subject').value;
            const component = subject === "Combined Maths" ? "General" : document.getElementById('component').value;
            const paperName = document.getElementById('paperName').value.trim();
            const topicTag = document.getElementById('topicTag').value.trim() || 'N/A';
            const scoreObtained = parseFloat(document.getElementById('scoreObtained').value);
            const scoreTotal = parseFloat(document.getElementById('scoreTotal').value);

            if (scoreObtained > scoreTotal) { alert("Obtained score cannot exceed total."); return; }

            marks.push({ id: Date.now().toString(), date, subject, component, paperName, topicTag, scoreObtained, scoreTotal, percentage: parseFloat(((scoreObtained / scoreTotal) * 100).toFixed(2)) });
            marks.sort((a, b) => new Date(a.date) - new Date(b.date));
            localStorage.setItem('real_sheet_marks', JSON.stringify(marks));
            updateDashboard();
            document.getElementById('paperName').value = ''; document.getElementById('topicTag').value = ''; document.getElementById('scoreObtained').value = ''; document.getElementById('scoreTotal').value = '';
        }

        async function pushToSheets() {
            if (!scriptUrl) { alert("Link your Web App URL first!"); return; }
            updateSyncStatus('syncing');
            try {
                await fetch(scriptUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(marks)
                });
                alert("Data state successfully exported to Google Sheet rows!");
            } catch (e) {
                alert("Sync write completed.");
            } finally { updateSyncStatus('idle'); }
        }

        async function pullFromSheets() {
            if (!scriptUrl) { alert("Link your Web App URL first!"); return; }
            updateSyncStatus('syncing');
            const icon = document.getElementById('syncBtnIcon');
            if (icon) icon.classList.add('animate-spin');
            try {
                const response = await fetch(scriptUrl);
                const cloudMarks = await response.json();
                if (cloudMarks && Array.isArray(cloudMarks)) {
                    marks = cloudMarks;
                    localStorage.setItem('real_sheet_marks', JSON.stringify(marks));
                    updateDashboard();
                    alert("Synced with Google Sheet spreadsheet records!");
                }
            } catch (e) {
                alert("Could not fetch remote values. Check alignment config.");
            } finally {
                updateSyncStatus('idle');
                if (icon) icon.classList.remove('animate-spin');
            }
        }

        function handleImportFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    const incoming = importedData.marks || importedData.tracker_marks || (Array.isArray(importedData) ? importedData : null);
                    if (incoming) {
                        marks = incoming;
                        localStorage.setItem('real_sheet_marks', JSON.stringify(marks));
                        updateDashboard();
                        alert("Data local cache loaded successfully!");
                    }
                } catch (err) { alert("Error reading file."); }
            };
            reader.readAsText(file);
        }

        function exportData() {
            const blob = new Blob([JSON.stringify({ marks })], { type: 'application/json' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `tracker_backup.json`; a.click();
        }

        function deleteMark(id) {
            if (confirm("Delete this row?")) {
                marks = marks.filter(m => m.id !== id);
                localStorage.setItem('real_sheet_marks', JSON.stringify(marks));
                updateDashboard();
            }
        }

        function handleSubjectChange() {
            document.getElementById('componentWrapper').style.display = document.getElementById('subject').value === "Combined Maths" ? 'none' : 'block';
        }

        function updateDashboard() {
            const windowDays = document.getElementById('timeframeFilter').value;
            const threshold = windowDays === 'all' ? new Date(0) : new Date(Date.now() - windowDays * 24 * 60 * 60 * 1000);
            const dataset = marks.filter(m => new Date(m.date) >= threshold);
            
            document.getElementById('averagesGrid').innerHTML = SUBJECTS.map(sub => {
                const subEntries = dataset.filter(m => m.subject === sub);
                const average = subEntries.length ? (subEntries.reduce((a, c) => a + c.percentage, 0) / subEntries.length).toFixed(1) + '%' : 'N/A';
                let col = sub.includes("2026") ? "border-teal-500 text-teal-950" : sub.includes("2027") ? "border-cyan-500 text-cyan-950" : sub === "Chemistry" ? "border-orange-500 text-orange-950" : "border-indigo-500 text-indigo-950";
                return `<div class="bg-gray-50 p-3.5 rounded-lg border-l-4 ${col}"><div class="text-xs uppercase font-bold text-gray-400 truncate">${sub}</div><div class="text-xl font-black mt-1">${average}</div><div class="text-[10px] text-gray-400">${subEntries.length} items</div></div>`;
            }).join('');

            const tbody = document.getElementById('historyTableBody');
            if (dataset.length === 0) { tbody.innerHTML = `<tr><td colspan="6" class="text-center p-8 text-gray-400 italic">No historical records found.</td></tr>`; } 
            else {
                tbody.innerHTML = [...dataset].reverse().map(m => `
                    <tr class="hover:bg-gray-50/70">
                        <td class="p-3 text-gray-500 font-medium">${m.date}</td>
                        <td class="p-3"><span class="font-bold block">${m.subject}</span><span class="text-xs text-gray-400 font-semibold">${m.component}</span></td>
                        <td class="p-3"><span class="text-gray-700 block">${m.paperName}</span><span class="inline-block bg-gray-100 text-gray-500 text-[10px] px-1.5 py-0.5 rounded mt-0.5">🏷️ ${m.topicTag}</span></td>
                        <td class="p-3 text-center font-mono text-gray-500">${m.scoreObtained} / ${m.scoreTotal}</td>
                        <td class="p-3 text-right font-mono font-black text-indigo-600 text-base">${m.percentage}%</td>
                        <td class="p-3 text-center"><button onclick="deleteMark('${m.id}')" class="text-gray-400 hover:text-rose-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button></td>
                    </tr>
                `).join('');
                lucide.createIcons();
            }

            const ctx = document.getElementById('performanceChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            if (dataset.length === 0) return;

            const uniqueDates = [...new Set(dataset.map(m => m.date))];
            const colorMap = { "Combined Maths": "#4f46e5", "Physics 2026": "#0d9488", "Physics 2027": "#0891b2", "Chemistry": "#ea580c" };
            
            const chartDatasets = SUBJECTS.map(sub => {
                return {
                    label: sub,
                    data: uniqueDates.map(d => {
                        const m = dataset.filter(x => x.subject === sub && x.date === d);
                        return m.length ? m.reduce((a, b) => a + b.percentage, 0) / m.length : null;
                    }),
                    borderColor: colorMap[sub], backgroundColor: colorMap[sub] + "10", borderWidth: 2, spanGaps: true, tension: 0.1
                };
            }).filter(d => d.data.some(p => p !== null));

            chartDatasets.push({ label: 'Target Line', data: Array(uniqueDates.length).fill(TARGET_BENCHMARK), borderColor: '#f43f5e', borderWidth: 1, borderDash: [5, 5], pointRadius: 0, fill: false });
            chartInstance = new Chart(ctx, { type: 'line', data: { labels: uniqueDates, datasets: chartDatasets }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 0, max: 100 } } } });
        }
    </script>
</body>
</html>
</body>
